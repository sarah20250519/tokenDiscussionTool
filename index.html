<!DOCTYPE html>
<html lang="zh-TW">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Design Token 色票管理</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="./all.css">
</head>

<body>
	<header>
		<div class="logo">🎨</div>
		<h1>Design Token 色票管理
			<span>CSS Class / SASS 變數 / 主題色碼</span>
		</h1>
	</header>

	<div class="toolbar">
		<button class="btn primary" onclick="addRow()">＋ 新增 Token</button>
		<button class="btn theme-add-btn" onclick="addTheme()">＋ 新增主題欄</button>
		<button class="btn save-btn" id="saveBtn" onclick="saveData()">💾 儲存</button>
		<span id="saveStatus"></span>
		<button class="btn" onclick="exportCSS()">⬇ 匯出 CSS 變數</button>
		<button class="btn" onclick="exportSCSS()">⬇ 匯出 SCSS</button>
		<button class="btn export-btn" onclick="copyJSON()">｛｝複製 JSON</button>
	</div>

	<div class="table-wrap" style="overflow-x:auto;">
		<table id="tokenTable">
			<thead id="tokenHead"></thead>
			<tbody id="tokenBody"></tbody>
		</table>
	</div>

	<!-- Add Theme Modal -->
	<div class="modal-backdrop" id="addThemeModal">
		<div class="modal" style="min-width:340px;">
			<h2>新增主題欄</h2>
			<p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">輸入主題名稱（例如：High Contrast、Brand、Holiday）
			</p>
			<input id="newThemeName" class="editable"
				style="width:100%;font-size:14px;border:1px solid var(--border-bright);background:var(--surface2);"
				placeholder="主題名稱">
			<div class="modal-footer">
				<button class="btn primary" onclick="confirmAddTheme()">新增</button>
				<button class="btn" onclick="closeAddThemeModal()">取消</button>
			</div>
		</div>
	</div>

	<!-- Export Modal -->
	<div class="modal-backdrop" id="exportModal">
		<div class="modal">
			<h2 id="exportTitle">匯出結果</h2>
			<pre id="exportContent"></pre>
			<div class="modal-footer">
				<button class="btn" onclick="copyExport()">複製</button>
				<button class="btn" onclick="closeModal()">關閉</button>
			</div>
		</div>
	</div>

	<script>
		// themes: array of { key, label }
		let themes = [
			{ key: 'light', label: 'Light' },
			{ key: 'dark', label: 'Dark' },
			{ key: 'special', label: 'Special' },
		];

		let tokens = [
			{ id: 1, className: '.text-primary', sass: '$primary', shared: 'primary', colors: { light: '#000000', dark: '#ffffff', special: '#e32145' } },
			{ id: 2, className: '.text-secondary', sass: '$secondary', shared: 'secondary', colors: { light: '#333333', dark: '#cccccc', special: '#9b59b6' } },
			{ id: 3, className: '.bg-surface', sass: '$surface', shared: 'surface', colors: { light: '#ffffff', dark: '#1a1a2e', special: '#0a0a1a' } },
			{ id: 4, className: '.accent', sass: '$accent', shared: 'accent', colors: { light: '#7c6af7', dark: '#9580ff', special: '#c084fc' } },
		];

		let nextId = 5;

		const THEME_COLORS = ['#fbbf24', '#60a5fa', '#f472b6', '#4ade80', '#fb923c', '#38bdf8', '#a78bfa', '#f43f5e'];

		function themeColor(idx) {
			return THEME_COLORS[idx % THEME_COLORS.length];
		}

		function sanitizeHex(val) {
			val = val.trim();
			if (!val.startsWith('#')) val = '#' + val;
			return val;
		}

		function isValidHex(val) {
			return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(val);
		}

		function renderHead() {
			const thead = document.getElementById('tokenHead');
			const themeColspan = themes.length;
			// Row 1: group headers
			let r1 = `<tr class="th-group">
      <td class="section-rd" colspan="2">RD 定義</td>
      <td class="section-shared">RD 和設計共同定義</td>
      <td class="section-theme" colspan="${themeColspan}">主題及色碼（主題 class 由 RD 定義）</td>
      <td></td>
    </tr>`;

			// Row 2: sub headers
			let themeCols = themes.map((th, i) => {
				const c = themeColor(i);
				return `<td>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="theme-label" style="color:${c};margin:0;">${th.label}</span>
          ${themes.length > 1 ? `<button onclick="deleteTheme('${th.key}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 2px;line-height:1;" title="刪除此主題欄">✕</button>` : ''}
        </div>
      </td>`;
			}).join('');

			let r2 = `<tr class="th-sub">
      <td>class name</td>
      <td>SASS 變數</td>
      <td>_sass 顏色變數名稱</td>
      ${themeCols}
      <td style="width:40px;"></td>
    </tr>`;

			thead.innerHTML = r1 + r2;
		}

		function renderBody() {
			const tbody = document.getElementById('tokenBody');
			tbody.innerHTML = '';
			tokens.forEach(tok => {
				const tr = document.createElement('tr');
				tr.className = 'token-row';
				tr.dataset.id = tok.id;

				const themeCells = themes.map(th => {
					const val = tok.colors[th.key] || '#888888';
					const safeVal = isValidHex(val) ? val : '#888888';
					return `<td>
          <div class="color-cell">
            <div class="color-swatch" style="background:${val};" title="點擊選色">
              <input type="color" class="native-picker" value="${safeVal}"
                oninput="updateColor(${tok.id},'${th.key}',this.value)"
                onchange="updateColor(${tok.id},'${th.key}',this.value)">
            </div>
            <input class="color-hex" value="${val}" placeholder="#000000"
              oninput="onHexInput(${tok.id},'${th.key}',this.value)"
              onblur="onHexBlur(${tok.id},'${th.key}',this.value)">
          </div>
        </td>`;
				}).join('');

				tr.innerHTML = `
        <td><input class="editable" placeholder=".class-name" value="${tok.className}"
          oninput="updateField(${tok.id},'className',this.value)"></td>
        <td><input class="editable" style="color:#60d9fa;" placeholder="$variable" value="${tok.sass}"
          oninput="updateField(${tok.id},'sass',this.value)"></td>
        <td><input class="shared-input" placeholder="_sass 變數名稱" value="${tok.shared}"
          oninput="updateField(${tok.id},'shared',this.value)"></td>
        ${themeCells}
        <td><button class="del-btn" onclick="deleteRow(${tok.id})" title="刪除">✕</button></td>
      `;
				tbody.appendChild(tr);
			});
		}

		function render() {
			renderHead();
			renderBody();
		}

		function updateField(id, field, val) {
			const tok = tokens.find(t => t.id === id);
			if (tok) tok[field] = val;
		}

		function updateColor(id, themeKey, val) {
			const tok = tokens.find(t => t.id === id);
			if (!tok) return;
			tok.colors[themeKey] = val;
			const row = document.querySelector(`tr[data-id="${id}"]`);
			if (!row) return;
			const cells = row.querySelectorAll('.color-cell');
			const idx = themes.findIndex(th => th.key === themeKey);
			if (idx < 0) return;
			cells[idx].querySelector('.color-swatch').style.background = val;
			cells[idx].querySelector('.color-hex').value = val;
		}

		function onHexInput(id, themeKey, val) {
			const tok = tokens.find(t => t.id === id);
			if (!tok) return;
			tok.colors[themeKey] = val;
			const row = document.querySelector(`tr[data-id="${id}"]`);
			if (!row) return;
			const cells = row.querySelectorAll('.color-cell');
			const idx = themes.findIndex(th => th.key === themeKey);
			if (idx < 0) return;
			cells[idx].querySelector('.color-swatch').style.background = val;
			if (isValidHex(val)) cells[idx].querySelector('.native-picker').value = val;
		}

		function onHexBlur(id, themeKey, val) {
			updateColor(id, themeKey, sanitizeHex(val));
		}

		function addRow() {
			const colors = {};
			themes.forEach(th => colors[th.key] = '#ffffff');
			tokens.push({ id: nextId++, className: '', sass: '', shared: '', colors });
			render();
			const rows = document.querySelectorAll('.token-row');
			const last = rows[rows.length - 1];
			if (last) last.querySelector('.editable').focus();
		}

		function deleteRow(id) {
			tokens = tokens.filter(t => t.id !== id);
			render();
		}

		// ── THEME COLUMN ──
		function addTheme() {
			document.getElementById('newThemeName').value = '';
			document.getElementById('addThemeModal').classList.add('open');
			setTimeout(() => document.getElementById('newThemeName').focus(), 50);
		}

		function confirmAddTheme() {
			const name = document.getElementById('newThemeName').value.trim();
			if (!name) return;
			const key = name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
			if (themes.find(th => th.key === key)) {
				alert('此主題名稱已存在');
				return;
			}
			themes.push({ key, label: name });
			tokens.forEach(tok => { tok.colors[key] = '#888888'; });
			closeAddThemeModal();
			render();
		}

		function deleteTheme(key) {
			if (themes.length <= 1) return;
			themes = themes.filter(th => th.key !== key);
			tokens.forEach(tok => { delete tok.colors[key]; });
			render();
		}

		function closeAddThemeModal() {
			document.getElementById('addThemeModal').classList.remove('open');
		}

		document.getElementById('newThemeName') && document.getElementById('newThemeName').addEventListener('keydown', e => {
			if (e.key === 'Enter') confirmAddTheme();
			if (e.key === 'Escape') closeAddThemeModal();
		});

		// ── EXPORT ──
		function exportCSS() {
			let out = ':root {\n';
			tokens.forEach(t => {
				const name = t.shared || t.className.replace('.', '');
				themes.forEach(th => {
					out += `  --color-${name}-${th.key}: ${t.colors[th.key] || '#000000'};\n`;
				});
			});
			out += '}\n';
			themes.forEach(th => {
				out += `\n.theme-${th.key} {\n`;
				tokens.forEach(t => {
					const name = t.shared || t.className.replace('.', '');
					out += `  --color-${name}: var(--color-${name}-${th.key});\n`;
				});
				out += '}\n';
			});
			showModal('CSS 變數 匯出', out);
		}

		function exportSCSS() {
			let out = '';
			themes.forEach(th => {
				out += `// ${th.label} theme\n`;
				tokens.forEach(t => {
					const n = t.sass || ('$' + (t.shared || 'color'));
					out += `${n}-${th.key}: ${t.colors[th.key] || '#000000'};\n`;
				});
				out += '\n';
			});
			out += '// Class mappings\n';
			tokens.forEach(t => {
				if (!t.className) return;
				out += `${t.className} { color: ${t.sass}; }\n`;
			});
			showModal('SCSS 匯出', out);
		}

		function copyJSON() {
			const out = JSON.stringify(tokens.map(({ id, ...rest }) => rest), null, 2);
			navigator.clipboard?.writeText(out);
			showModal('JSON Token 資料', out);
		}

		function showModal(title, content) {
			document.getElementById('exportTitle').textContent = title;
			document.getElementById('exportContent').textContent = content;
			document.getElementById('exportModal').classList.add('open');
		}

		function closeModal() {
			document.getElementById('exportModal').classList.remove('open');
		}

		function copyExport() {
			const text = document.getElementById('exportContent').textContent;
			navigator.clipboard?.writeText(text);
			const btn = document.querySelector('.modal-footer .btn');
			btn.textContent = '已複製 ✓';
			setTimeout(() => btn.textContent = '複製', 1500);
		}

		document.getElementById('exportModal').addEventListener('click', function (e) {
			if (e.target === this) closeModal();
		});
		document.getElementById('addThemeModal').addEventListener('click', function (e) {
			if (e.target === this) closeAddThemeModal();
		});

		// ── LOCALSTORAGE ──
		const STORAGE_KEY = 'design_tokens_v1';
		let isDirty = false;

		function saveData() {
			const payload = { themes, tokens, nextId };
			localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
			isDirty = false;
			const btn = document.getElementById('saveBtn');
			const status = document.getElementById('saveStatus');
			btn.textContent = '✓ 已儲存';
			btn.classList.add('saved');
			const now = new Date();
			status.textContent = `上次儲存 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
			setTimeout(() => {
				btn.textContent = '💾 儲存';
				btn.classList.remove('saved');
			}, 2000);
		}

		function loadData() {
			try {
				const raw = localStorage.getItem(STORAGE_KEY);
				if (!raw) return false;
				const payload = JSON.parse(raw);
				if (payload.themes) themes = payload.themes;
				if (payload.tokens) tokens = payload.tokens;
				if (payload.nextId) nextId = payload.nextId;
				return true;
			} catch (e) { return false; }
		}

		function markDirty() {
			if (!isDirty) {
				isDirty = true;
				const btn = document.getElementById('saveBtn');
				if (btn && !btn.textContent.includes('✓')) btn.textContent = '💾 儲存*';
			}
		}

		// Wrap mutating functions to auto mark dirty
		['updateField', 'updateColor', 'addRow', 'deleteRow', 'confirmAddTheme', 'deleteTheme'].forEach(fn => {
			const orig = window[fn];
			window[fn] = function (...args) { orig(...args); markDirty(); };
		});

		// Cmd/Ctrl+S shortcut
		document.addEventListener('keydown', e => {
			if ((e.metaKey || e.ctrlKey) && e.key === 's') {
				e.preventDefault();
				saveData();
			}
		});

		const hasData = loadData();
		render();

		if (hasData) {
			const status = document.getElementById('saveStatus');
			status.textContent = '已載入上次儲存的資料';
			setTimeout(() => { status.textContent = ''; }, 3000);
		}
	</script>
</body>

</html>
